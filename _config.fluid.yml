navbar:
  blog_title: "心海澄明"
  ground_glass:
    enable: true
    px: 16
    alpha: 0.72
  menu:
    - { key: "home", name: "首页", link: "/", icon: "iconfont icon-home-fill" }
    - { key: "projects", name: "项目", link: "/categories/项目/", icon: "iconfont icon-archive-fill" }
    - { key: "notes", name: "文章", link: "/archives/", icon: "iconfont icon-bookmark-fill" }
    - { key: "about", name: "关于", link: "/about/", icon: "iconfont icon-user-fill" }

fun_features:
  typing:
    enable: false

scroll_down_arrow:
  enable: false

custom_css:
  - /css/custom.css

dark_mode:
  enable: true
  default: dark

index:
  banner_img: /img/default.png
  banner_img_height: 100
  banner_mask_alpha: 0.48
  slogan:
    enable: true
    text: "游戏研究 · 用户洞察 · 社区反馈分析"
    api: ""
  auto_excerpt:
    enable: true
  post_url_target: _self
  post_meta:
    date: true
    category: true
    tag: true
  post_sticky:
    enable: true
    icon: "iconfont icon-top"

about:
  enable: true
  banner_img: /img/default.png
  banner_img_height: 60
  banner_mask_alpha: 0.42
  avatar: /img/avatar.png
  name: "孙海澄"
  intro: "应用心理学背景｜游戏研究｜用户洞察｜社区反馈分析"
  icons:
    - { class: "iconfont icon-github-fill", link: "https://github.com/sherlock0717", tip: "GitHub" }
    - { class: "iconfont icon-bookmark-fill", link: "https://sherlock0717.github.io/PsyLens/", tip: "PsyLens" }
